appId: com.nassila.app
productName: Nassila
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - build/icon.png
  - build/icon.ico
  # Native / worker deps externalized from the main bundle (see electron.vite.config.ts).
  - node_modules/canvas/**/*
  - node_modules/@napi-rs/canvas/**/*
  - node_modules/@napi-rs/canvas-*/**/*
  - node_modules/tesseract.js/**/*
  - node_modules/tesseract.js-core/**/*
# Native .node, worker scripts, and WASM must load from a real filesystem path (not asar).
asarUnpack:
  - node_modules/canvas/**/*
  - node_modules/@napi-rs/canvas/**/*
  - node_modules/@napi-rs/canvas-*/**/*
  - node_modules/tesseract.js/**/*
  - node_modules/tesseract.js-core/**/*
extraResources:
  - from: resources/tesseract
    to: tesseract
    filter:
      - '*.traineddata'
      - checksums.sha256
      - README.md
  # Real filesystem paths — nativeImage often cannot load .ico from inside asar.
  - from: build/icon.ico
    to: app-icon.ico
  - from: build/icon.png
    to: app-icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName} Setup ${version}.${ext}
  # Builder pairs rcedit with signing. We stamp via scripts/stamp-win-exe-icon.mjs
  # AFTER --dir and BEFORE --prepackaged nsis/portable (see package.json build:win).
  # Stamping only after a one-shot --win nsis leaves the installer with Electron branding.
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Nassila
  uninstallDisplayName: Nassila
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
mac:
  target:
    - dmg
  icon: build/icon.png
linux:
  target:
    - AppImage
  icon: build/icon.png
