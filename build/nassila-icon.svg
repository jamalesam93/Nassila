<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512" aria-label="Nassila logo: open pages, magnifier on a citation line, link to verification">
  <defs>
    <linearGradient id="nassila-bg" x1="22" y1="28" x2="234" y2="236" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c4a6e"/>
      <stop offset="1" stop-color="#082f49"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#nassila-bg)"/>

  <!-- Open document / book: left page, spine gap, right page -->
  <path d="M 36 178 V 98 Q36 82 54 74 L 100 94 V 174 L 54 169 Q42 173 36 178Z"
        fill="#f8fafc" opacity="0.95"/>
  <path d="M 109 173 V 94 L 155 73 Q173 82 173 98 V 178 Q165 173 154 169 L109 173Z"
        fill="#e2e8f0" opacity="0.98"/>
  <path d="M 100 94 L 109 94 L 109 173 L 100 173 Z" fill="#64748b" opacity="0.22"/>

  <!-- Faint ruled lines on both pages -->
  <g stroke="#475569" stroke-width="5" stroke-linecap="round" opacity="0.35">
    <line x1="48" y1="112" x2="86" y2="112"/>
    <line x1="48" y1="126" x2="76" y2="126"/>
    <line x1="48" y1="140" x2="90" y2="140"/>
    <line x1="120" y1="112" x2="158" y2="112"/>
    <line x1="120" y1="126" x2="150" y2="126"/>
    <line x1="120" y1="140" x2="162" y2="140"/>
  </g>

  <!-- Focal citation line: emphasized under loupe -->
  <rect x="102" y="133" width="72" height="9" rx="3" fill="#38bdf8" opacity="0.95" filter="url(#glow)"/>

  <!-- Magnifying glass lens (central node) -->
  <circle cx="140" cy="122" r="44" fill="rgba(125,211,252,0.12)" stroke="#7dd3fc" stroke-width="7" stroke-opacity="0.95"/>
  <circle cx="140" cy="122" r="44" fill="none" stroke="#bae6fd" stroke-width="2" opacity="0.5"/>

  <!-- Handle -->
  <line x1="172" y1="154" x2="200" y2="186" stroke="#7dd3fc" stroke-width="11" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Thin curve from focal area toward link glyph (discovery / resolver path) -->
  <path d="M 174 126 C 204 118 216 138 226 154" stroke="#a5f3fc" stroke-width="4" fill="none"
        stroke-linecap="round" opacity="0.9"/>

  <!-- Small link glyph (DOI / connection) -->
  <g transform="translate(214,154) rotate(-18)" fill="none" stroke="#fde68a" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -8 -6 q -14 0 -14 14 q 0 14 14 14 h10 q14 0 14 -14"/>
    <path d="M 8 6 q 14 0 14 -14 q 0 -14 -14 -14 h-10 q -14 0 -14 14"/>
  </g>
</svg>
